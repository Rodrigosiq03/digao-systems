<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Digao Cloud Gaming MVP</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #020617;
        color: #e2e8f0;
        font-family: "JetBrains Mono", "Fira Code", monospace;
      }

      #game-stream {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: #000;
      }

      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.35);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="status">initializing...</div>
    <video autoplay muted playsinline id="game-stream"></video>
    <script src="/app.js"></script>
  </body>
</html>
