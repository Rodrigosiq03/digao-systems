name: pulumi-oauth2-proxy

permissions:
  contents: read
  issues: write

on:
  push:
    branches:
      - develop
    paths:
      - "pulumi/oauth2-proxy/**"
      - "pulumi/scripts/apply-secrets.py"
      - ".github/workflows/pulumi-oauth2-proxy.yml"
  workflow_dispatch:
    inputs:
      stack:
        description: "Pulumi stack select (dev|homolog)"
        required: true
        type: choice
        default: dev
        options:
          - dev
          - homolog

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: pulumi/oauth2-proxy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide stack
        id: stack
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.stack }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare venv
        run: |
          PY="$HOME/.pyenv/versions/3.12.8/bin/python"
          if [[ ! -x "$PY" ]]; then
            echo "pyenv Python 3.12.8 not found at $PY"
            exit 1
          fi
          "$PY" --version
          rm -rf /data/apps/.venvs/pulumi-oauth2-proxy
          "$PY" -m venv /data/apps/.venvs/pulumi-oauth2-proxy
          /data/apps/.venvs/pulumi-oauth2-proxy/bin/python -m pip install --upgrade pip

      - name: Install dependencies
        run: /data/apps/.venvs/pulumi-oauth2-proxy/bin/python -m pip install --no-cache-dir --force-reinstall -r requirements.txt

      - name: Pulumi login
        run: pulumi login "${{ secrets.PULUMI_BACKEND_URL }}"

      - name: Apply secrets
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
        run: |
          SECRETS_FILE="${{ secrets.SECRETS_FILE_PATH }}"
          if [[ -z "$SECRETS_FILE" ]]; then
            SECRETS_FILE="/data/apps/pulumi/.secrets.local"
          fi
          /data/apps/.venvs/pulumi-oauth2-proxy/bin/python \
            ../scripts/apply-secrets.py \
            --project oauth2-proxy \
            --stack "${{ steps.stack.outputs.value }}" \
            --env "${{ steps.stack.outputs.value }}" \
            --secrets-file "$SECRETS_FILE" \
            --create

      - name: Select stack
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
        run: pulumi stack select "${{ steps.stack.outputs.value }}"

      - name: Deploy
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
        run: pulumi up --yes
